<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Evaluaciones{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
      :root {
        --brand-blue: #4357ff;
        --brand-blue-dark: #2f45d8;
        --brand-aqua: #8df1e8;
        --brand-ink: #27325d;
        --soft-line: rgba(255, 255, 255, .22);
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        margin: 0;
        color: var(--brand-ink);
        background:
          radial-gradient(circle at 74% 18%, rgba(155, 237, 227, .65) 0 13%, transparent 13.4%),
          radial-gradient(circle at 92% 88%, rgba(111, 151, 255, .55) 0 15%, transparent 15.4%),
          radial-gradient(circle at 9% 69%, rgba(141, 241, 232, .55) 0 14%, transparent 14.4%),
          linear-gradient(165deg, #4357ff 0%, #5366ff 50%, #95f4e6 100%);
        font-family: Arial, Helvetica, sans-serif;
        overflow-x: hidden;
      }

      body::before,
      body::after {
        content: "";
        position: fixed;
        inset: 0;
        pointer-events: none;
        z-index: 0;
      }

      body::before {
        background:
          radial-gradient(circle at 23% 30%, transparent 0 10%, var(--soft-line) 10.2% 11.5%, transparent 11.8%),
          radial-gradient(circle at 61% 1%, transparent 0 7%, var(--soft-line) 7.2% 8.2%, transparent 8.6%),
          radial-gradient(circle at 82% 76%, transparent 0 14%, rgba(47, 69, 216, .28) 14.2% 15.8%, transparent 16.1%);
      }

      body::after {
        opacity: .45;
        background-image: radial-gradient(rgba(255, 255, 255, .65) 1.4px, transparent 1.4px);
        background-size: 18px 18px;
        background-position: right 68px top 96px;
        mask-image: linear-gradient(90deg, transparent 0 62%, #000 72% 100%);
      }

      .app-bg-shapes {
        position: fixed;
        inset: 0;
        overflow: hidden;
        pointer-events: none;
        z-index: 0;
      }

      .app-bg-shapes span {
        position: absolute;
        display: block;
        border-radius: 999px;
        border: 18px solid rgba(255, 255, 255, .18);
      }

      .shape-one {
        width: 250px;
        height: 250px;
        left: -54px;
        top: -34px;
      }

      .shape-two {
        width: 170px;
        height: 170px;
        right: 74px;
        bottom: -42px;
        border-color: rgba(47, 69, 216, .22) !important;
      }

      .shape-three {
        width: 120px;
        height: 120px;
        left: 35%;
        bottom: 7%;
        border-color: rgba(255, 255, 255, .16) !important;
      }

      .auth-shell {
        position: relative;
        z-index: 1;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 32px 16px;
      }

      .auth-card {
        width: min(920px, 100%);
        min-height: 520px;
        display: grid;
        grid-template-columns: 1.1fr .9fr;
        background: #fff;
        box-shadow: 0 24px 70px rgba(24, 35, 100, .28);
      }

      .auth-hero {
        position: relative;
        min-height: 520px;
        padding: 56px;
        display: flex;
        flex-direction: column;
        justify-content: center;
        color: #fff;
        overflow: hidden;
        background:
          radial-gradient(circle at 18% 80%, rgba(141, 241, 232, .25) 0 17%, transparent 17.4%),
          radial-gradient(circle at 92% 18%, rgba(141, 241, 232, .2) 0 22%, transparent 22.4%),
          linear-gradient(155deg, #334aff 0%, #4458ff 62%, #596cff 100%);
      }

      .auth-hero::before,
      .auth-hero::after {
        content: "";
        position: absolute;
        border-radius: 999px;
        border: 20px solid rgba(255, 255, 255, .18);
      }

      .auth-hero::before {
        width: 210px;
        height: 210px;
        top: -74px;
        left: -48px;
      }

      .auth-hero::after {
        width: 190px;
        height: 190px;
        right: -76px;
        bottom: 28px;
      }

      .brand-mark,
      .auth-hero-content {
        position: relative;
        z-index: 1;
      }

      .brand-mark {
        display: flex;
        align-items: center;
        gap: 10px;
        font-weight: 800;
        letter-spacing: .08em;
        text-transform: uppercase;
        margin-bottom: 70px;
      }

      .brand-dot {
        width: 24px;
        height: 24px;
        border-radius: 999px;
        background: #fff;
        box-shadow: -13px 0 0 rgba(255, 255, 255, .7);
      }

      .auth-hero h1 {
        max-width: 360px;
        margin: 0 0 20px;
        font-size: clamp(2.4rem, 5vw, 4rem);
        font-weight: 800;
        line-height: .95;
      }

      .auth-hero p {
        max-width: 360px;
        margin: 0;
        color: rgba(255, 255, 255, .82);
      }

      .auth-form-panel {
        min-height: 520px;
        display: flex;
        align-items: center;
        padding: 42px;
      }

      .auth-form-inner {
        width: 100%;
      }

      .auth-form-inner h2 {
        margin-bottom: 8px;
        font-weight: 800;
      }

      .auth-form-inner p {
        color: #667085;
      }

      .auth-form p {
        margin-bottom: 16px;
      }

      .auth-form label {
        display: block;
        margin-bottom: 6px;
        color: #55608c;
        font-size: .86rem;
        font-weight: 700;
      }

      .auth-form input {
        display: block;
        width: 100%;
        min-height: 48px;
        border: 2px solid #6d79bb;
        border-radius: 0;
        padding: 10px 14px;
        color: var(--brand-ink);
      }

      .auth-form input:focus {
        border-color: var(--brand-blue);
        box-shadow: 0 0 0 .2rem rgba(67, 87, 255, .16);
        outline: 0;
      }

      .auth-form .helptext {
        display: block;
        margin-top: 6px;
        color: #7a84ad;
        font-size: .82rem;
      }

      .errorlist {
        margin: 6px 0 0;
        padding-left: 18px;
        color: #dc3545;
        font-size: .88rem;
      }

      .btn-brand {
        --bs-btn-bg: var(--brand-blue);
        --bs-btn-border-color: var(--brand-blue);
        --bs-btn-hover-bg: var(--brand-blue-dark);
        --bs-btn-hover-border-color: var(--brand-blue-dark);
        --bs-btn-color: #fff;
        border-radius: 2px;
        font-weight: 700;
        min-height: 42px;
        padding-inline: 28px;
      }

      .btn-brand-outline {
        --bs-btn-color: var(--brand-blue-dark);
        --bs-btn-border-color: #6d79bb;
        --bs-btn-hover-bg: #eef1ff;
        --bs-btn-hover-border-color: var(--brand-blue-dark);
        border-radius: 2px;
        font-weight: 700;
        min-height: 42px;
        padding-inline: 28px;
      }

      .top-messages {
        position: fixed;
        top: 18px;
        left: 50%;
        z-index: 10;
        width: min(640px, calc(100% - 32px));
        transform: translateX(-50%);
      }

      @media (max-width: 820px) {
        .auth-card {
          grid-template-columns: 1fr;
        }

        .auth-hero {
          min-height: 320px;
          padding: 36px;
        }

        .brand-mark {
          margin-bottom: 38px;
        }

        .auth-form-panel {
          min-height: auto;
          padding: 32px 24px;
        }
      }
    </style>
  </head>
  <body>
    <div class="app-bg-shapes" aria-hidden="true">
      <span class="shape-one"></span>
      <span class="shape-two"></span>
      <span class="shape-three"></span>
    </div>

    {% if messages %}
      <div class="top-messages">
        {% for message in messages %}
          <div class="alert alert-{{ message.tags|default:'info' }} alert-dismissible fade show" role="alert">
            {{ message }}
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Cerrar"></button>
          </div>
        {% endfor %}
      </div>
    {% endif %}

    <main class="auth-shell">
      {% block content %}{% endblock %}
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
