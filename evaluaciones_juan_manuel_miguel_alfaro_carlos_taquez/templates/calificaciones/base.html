<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Calificaciones{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
      :root {
        --brand-blue: #4357ff;
        --brand-blue-dark: #2f45d8;
        --brand-aqua: #8df1e8;
        --brand-ink: #27325d;
        --soft-line: rgba(255, 255, 255, .22);
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        margin: 0;
        color: var(--brand-ink);
        background:
          radial-gradient(circle at 75% 16%, rgba(155, 237, 227, .62) 0 13%, transparent 13.4%),
          radial-gradient(circle at 94% 88%, rgba(111, 151, 255, .55) 0 15%, transparent 15.4%),
          radial-gradient(circle at 8% 72%, rgba(141, 241, 232, .5) 0 14%, transparent 14.4%),
          linear-gradient(165deg, #4357ff 0%, #5366ff 50%, #95f4e6 100%);
        font-family: Arial, Helvetica, sans-serif;
        overflow-x: hidden;
      }

      body::before,
      body::after {
        content: "";
        position: fixed;
        inset: 0;
        pointer-events: none;
        z-index: 0;
      }

      body::before {
        background:
          radial-gradient(circle at 20% 22%, transparent 0 10%, var(--soft-line) 10.2% 11.5%, transparent 11.8%),
          radial-gradient(circle at 58% 2%, transparent 0 7%, var(--soft-line) 7.2% 8.2%, transparent 8.6%),
          radial-gradient(circle at 80% 75%, transparent 0 14%, rgba(47, 69, 216, .28) 14.2% 15.8%, transparent 16.1%);
      }

      body::after {
        opacity: .42;
        background-image: radial-gradient(rgba(255, 255, 255, .65) 1.4px, transparent 1.4px);
        background-size: 18px 18px;
        background-position: right 64px top 116px;
        mask-image: linear-gradient(90deg, transparent 0 60%, #000 72% 100%);
      }

      .app-bg-shapes {
        position: fixed;
        inset: 0;
        overflow: hidden;
        pointer-events: none;
        z-index: 0;
      }

      .app-bg-shapes span {
        position: absolute;
        display: block;
        border-radius: 999px;
        border: 18px solid rgba(255, 255, 255, .18);
      }

      .shape-one {
        width: 250px;
        height: 250px;
        left: -54px;
        top: -34px;
      }

      .shape-two {
        width: 170px;
        height: 170px;
        right: 74px;
        bottom: -42px;
        border-color: rgba(47, 69, 216, .22) !important;
      }

      .shape-three {
        width: 120px;
        height: 120px;
        left: 35%;
        bottom: 7%;
        border-color: rgba(255, 255, 255, .16) !important;
      }

      .navbar {
        position: relative;
        z-index: 2;
        background: rgba(51, 74, 255, .72);
        border-bottom: 1px solid rgba(255, 255, 255, .22);
        backdrop-filter: blur(14px);
      }

      .navbar-brand {
        display: flex;
        align-items: center;
        gap: 10px;
        color: #fff !important;
        font-weight: 800;
        letter-spacing: .03em;
      }

      .brand-dot {
        width: 18px;
        height: 18px;
        border-radius: 999px;
        background: #fff;
        box-shadow: -10px 0 0 rgba(255, 255, 255, .7);
      }

      .navbar .nav-link {
        color: rgba(255, 255, 255, .84);
        font-weight: 700;
      }

      .navbar .nav-link:hover,
      .navbar .nav-link:focus {
        color: #fff;
      }

      .page-shell {
        position: relative;
        z-index: 1;
        max-width: 1180px;
      }

      .content-panel {
        background: #ffffff;
        border: 0;
        border-radius: 0;
        box-shadow: 0 24px 70px rgba(24, 35, 100, .22);
      }

      .page-title {
        color: #fff;
        text-shadow: 0 8px 28px rgba(20, 30, 90, .22);
      }

      .page-title .text-secondary {
        color: rgba(255, 255, 255, .78) !important;
      }

      .form-panel p {
        margin-bottom: 1rem;
      }

      .form-panel label {
        display: block;
        margin-bottom: .4rem;
        color: #55608c;
        font-weight: 700;
      }

      .form-panel input,
      .form-panel select,
      .form-panel textarea {
        display: block;
        width: 100%;
        min-height: 46px;
        border: 2px solid #6d79bb;
        border-radius: 0;
        padding: 10px 14px;
      }

      .form-panel input:focus,
      .form-panel select:focus,
      .form-panel textarea:focus {
        border-color: var(--brand-blue);
        box-shadow: 0 0 0 .2rem rgba(67, 87, 255, .16);
        outline: 0;
      }

      .form-panel .errorlist {
        margin: .35rem 0 0;
        padding-left: 1.1rem;
        color: #dc3545;
        font-size: .9rem;
      }

      .btn-primary,
      .btn-brand {
        --bs-btn-bg: var(--brand-blue);
        --bs-btn-border-color: var(--brand-blue);
        --bs-btn-hover-bg: var(--brand-blue-dark);
        --bs-btn-hover-border-color: var(--brand-blue-dark);
        border-radius: 2px;
        font-weight: 700;
      }

      .btn-outline-secondary,
      .btn-outline-primary {
        border-radius: 2px;
        font-weight: 700;
      }

      .btn-light {
        border-radius: 2px;
        color: var(--brand-blue-dark);
        font-weight: 800;
      }

      .metric {
        border-left: 5px solid #fff;
        background: rgba(255, 255, 255, .88);
        box-shadow: 0 18px 45px rgba(24, 35, 100, .16);
      }

      .table thead th {
        color: #55608c;
        white-space: nowrap;
      }

      .table-light {
        --bs-table-bg: #f2f4ff;
      }

      @media (max-width: 768px) {
        .content-panel {
          box-shadow: 0 18px 45px rgba(24, 35, 100, .18);
        }
      }
    </style>
  </head>
  <body>
    <div class="app-bg-shapes" aria-hidden="true">
      <span class="shape-one"></span>
      <span class="shape-two"></span>
      <span class="shape-three"></span>
    </div>

    <nav class="navbar navbar-expand-lg navbar-dark">
      <div class="container page-shell">
        <a class="navbar-brand" href="{% url 'calificaciones:listar' %}">
          <span class="brand-dot"></span>
          <span>Calificaciones</span>
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNavbar" aria-controls="mainNavbar" aria-expanded="false" aria-label="Abrir navegacion">
          <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="mainNavbar">
          {% if user.is_authenticated %}
            <ul class="navbar-nav ms-auto align-items-lg-center gap-lg-2">
              <li class="nav-item">
                <a class="nav-link" href="{% url 'calificaciones:crear' %}">Crear</a>
              </li>
              <li class="nav-item">
                <a class="nav-link" href="{% url 'calificaciones:listar' %}">Listar</a>
              </li>
              <li class="nav-item">
                <form method="post" action="{% url 'logout' %}" class="d-inline">
                  {% csrf_token %}
                  <button type="submit" class="btn btn-light btn-sm">Logout</button>
                </form>
              </li>
            </ul>
          {% else %}
            <ul class="navbar-nav ms-auto align-items-lg-center gap-lg-2">
              <li class="nav-item">
                <a class="nav-link" href="{% url 'login' %}">Login</a>
              </li>
              <li class="nav-item">
                <a class="btn btn-light btn-sm" href="{% url 'usuarios:registro' %}">Registro</a>
              </li>
            </ul>
          {% endif %}
        </div>
      </div>
    </nav>

    <main class="container page-shell py-4 py-lg-5">
      {% if messages %}
        <div class="mb-4">
          {% for message in messages %}
            <div class="alert alert-{{ message.tags|default:'info' }} alert-dismissible fade show" role="alert">
              {{ message }}
              <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Cerrar"></button>
            </div>
          {% endfor %}
        </div>
      {% endif %}

      {% block content %}{% endblock %}
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
