<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Calificaciones{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
      :root {
        --app-bg: #f6f8fb;
        --app-ink: #172033;
        --app-muted: #667085;
      }

      body {
        min-height: 100vh;
        background: var(--app-bg);
        color: var(--app-ink);
      }

      .navbar {
        box-shadow: 0 10px 30px rgba(16, 24, 40, 0.08);
      }

      .page-shell {
        max-width: 1180px;
      }

      .content-panel {
        background: #ffffff;
        border: 1px solid #e6eaf0;
        border-radius: 8px;
        box-shadow: 0 18px 45px rgba(16, 24, 40, 0.06);
      }

      .form-panel p {
        margin-bottom: 1rem;
      }

      .form-panel label {
        display: block;
        margin-bottom: .4rem;
        font-weight: 600;
      }

      .form-panel input,
      .form-panel select,
      .form-panel textarea {
        display: block;
        width: 100%;
      }

      .form-panel .errorlist {
        margin: .35rem 0 0;
        padding-left: 1.1rem;
        color: #dc3545;
        font-size: .9rem;
      }

      .metric {
        border-left: 4px solid #0d6efd;
        background: #f8fbff;
      }

      .table thead th {
        white-space: nowrap;
      }
    </style>
  </head>
  <body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
      <div class="container page-shell">
        <a class="navbar-brand fw-semibold" href="{% url 'calificaciones:listar' %}">Sistema de Calificaciones</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNavbar" aria-controls="mainNavbar" aria-expanded="false" aria-label="Abrir navegacion">
          <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="mainNavbar">
          {% if user.is_authenticated %}
            <ul class="navbar-nav ms-auto align-items-lg-center gap-lg-2">
              <li class="nav-item">
                <a class="nav-link" href="{% url 'calificaciones:crear' %}">Crear</a>
              </li>
              <li class="nav-item">
                <a class="nav-link" href="{% url 'calificaciones:listar' %}">Listar</a>
              </li>
              <li class="nav-item">
                <form method="post" action="{% url 'logout' %}" class="d-inline">
                  {% csrf_token %}
                  <button type="submit" class="btn btn-light btn-sm">Logout</button>
                </form>
              </li>
            </ul>
          {% else %}
            <ul class="navbar-nav ms-auto align-items-lg-center gap-lg-2">
              <li class="nav-item">
                <a class="nav-link" href="{% url 'login' %}">Login</a>
              </li>
              <li class="nav-item">
                <a class="btn btn-light btn-sm" href="{% url 'usuarios:registro' %}">Registro</a>
              </li>
            </ul>
          {% endif %}
        </div>
      </div>
    </nav>

    <main class="container page-shell py-4 py-lg-5">
      {% if messages %}
        <div class="mb-4">
          {% for message in messages %}
            <div class="alert alert-{{ message.tags|default:'info' }} alert-dismissible fade show" role="alert">
              {{ message }}
              <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Cerrar"></button>
            </div>
          {% endfor %}
        </div>
      {% endif %}

      {% block content %}{% endblock %}
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
